name: arrow_pussal
description: "ArrowX — a calm puzzle escape by Skyzen Infotech."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Routing
  go_router: ^15.1.2

  # Typography
  google_fonts: ^6.2.1

  # Icons (free package on pub.dev)
  iconsax_flutter: ^1.0.0

  # Animations
  flutter_animate: ^4.5.2

  # google_mobile_ads — add back when App ID is ready (crashes on start without one)

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Network
  connectivity_plus: ^6.1.4

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
